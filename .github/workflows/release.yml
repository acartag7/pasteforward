name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  GH_REPO: ${{ github.repository }}

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check tag matches Cargo version
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          test "${GITHUB_REF_NAME}" = "v${version}"

  create-release:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --draft \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

  assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: make verify
      - name: Package release tarball
        id: package
        run: |
          set -euo pipefail
          artifact_path="$(scripts/package-release.sh | sed -n 's#^\(.*/pasteforward-v.*\.tar\.gz\)$#\1#p' | tail -n 1)"
          if [ -z "${artifact_path}" ]; then
            echo "package script did not report a tarball path" >&2
            exit 1
          fi
          checksum_path="${artifact_path}.sha256"
          (
            cd "$(dirname "${artifact_path}")"
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$(basename "${artifact_path}")"
            else
              sha256sum "$(basename "${artifact_path}")"
            fi
          ) > "${checksum_path}"
          echo "artifact_path=${artifact_path}" >> "${GITHUB_OUTPUT}"
          echo "checksum_path=${checksum_path}" >> "${GITHUB_OUTPUT}"
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ steps.package.outputs.artifact_path }}" \
            "${{ steps.package.outputs.checksum_path }}" \
            --clobber

  publish:
    needs: assets
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --verify-tag
